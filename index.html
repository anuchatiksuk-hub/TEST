<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Math Gesture Game</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;background:#0d0d1a;color:white;font-family:'Segoe UI',sans-serif;overflow:hidden}
#root{width:100vw;height:100vh;display:flex;flex-direction:column;background:#0d0d1a}

#startView{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:14px}
#startView h1{font-size:2.4rem;font-weight:800;color:#a78bfa;text-shadow:0 0 30px rgba(124,58,237,0.5)}
#startView .sub{font-size:0.9rem;color:#6b7280;text-align:center;max-width:360px;line-height:1.6}
.nameIn{padding:12px 20px;border-radius:12px;border:1.5px solid #7c3aed;background:rgba(255,255,255,0.05);color:white;font-size:1rem;width:280px;text-align:center;outline:none}
.nameIn::placeholder{color:#4b5563}
.sBtn{padding:12px 32px;border-radius:12px;border:none;font-size:1rem;font-weight:600;cursor:pointer;transition:all 0.15s}
.sBtnP{background:#7c3aed;color:white}
.sBtnP:hover{background:#6d28d9;transform:translateY(-2px);box-shadow:0 8px 20px rgba(124,58,237,0.4)}
.sBtnS{background:rgba(255,255,255,0.07);color:#d1d5db;border:1px solid rgba(255,255,255,0.15)}
.sBtnS:hover{background:rgba(255,255,255,0.12)}
.camNote{font-size:0.75rem;color:#4b5563;max-width:320px;text-align:center;line-height:1.5}

#gameView{display:none;flex-direction:row;height:100vh}

#camSide{width:200px;flex-shrink:0;padding:10px;display:flex;flex-direction:column;gap:8px;border-right:1px solid rgba(255,255,255,0.07);overflow:hidden}
#camSide h3{font-size:0.72rem;color:#7c3aed;letter-spacing:1px;text-transform:uppercase}
#vWrap{position:relative;border-radius:10px;overflow:hidden;background:#111;aspect-ratio:4/3}
#camVid{width:100%;display:block;transform:scaleX(-1)}
#motionCvs{position:absolute;top:0;left:0;width:100%;height:100%;transform:scaleX(-1);pointer-events:none}
#camErr{font-size:0.72rem;color:#f87171;text-align:center;padding:6px;background:rgba(248,113,113,0.1);border-radius:8px}
#gStatus{background:rgba(255,255,255,0.04);border-radius:8px;padding:8px;text-align:center}
#gIcon{font-size:1.6rem;display:block}
#gLabel{font-size:0.72rem;color:#9ca3af;margin-top:2px}
.statB{background:rgba(255,255,255,0.04);border-radius:8px;padding:8px 10px}
.statL{font-size:0.65rem;color:#6b7280;text-transform:uppercase;letter-spacing:1px}
.statV{font-size:1.3rem;font-weight:700;margin-top:1px}
#tV{color:#f87171}#sV{color:#34d399}#lV{color:#fb923c}#stV{color:#fbbf24}
.statRow{display:flex;gap:8px}
#pauseB{padding:8px;border-radius:8px;border:1px solid rgba(255,255,255,0.15);background:rgba(255,255,255,0.06);color:#d1d5db;cursor:pointer;font-size:0.8rem;width:100%}
#pauseB:hover{background:rgba(255,255,255,0.1)}

#mainArea{flex:1;position:relative;overflow:hidden}
#gCanvas{position:absolute;inset:0;width:100%;height:100%}
#hud{position:absolute;top:0;left:0;right:0;padding:12px 16px;display:flex;justify-content:space-between;align-items:center;background:linear-gradient(to bottom,rgba(13,13,26,0.95),transparent);z-index:10}
#qDisp{font-size:1.8rem;font-weight:800;letter-spacing:2px;color:white}
#qDisp .op{color:#a78bfa}
#lvlB{background:rgba(124,58,237,0.25);border:1px solid rgba(124,58,237,0.5);border-radius:20px;padding:4px 14px;font-size:0.78rem;color:#c4b5fd}
.sideL{position:absolute;bottom:55px;font-size:0.75rem;color:rgba(255,255,255,0.2);z-index:5;pointer-events:none;line-height:1.8}
#lL{left:10px}#rL{right:10px;text-align:right}
#progW{position:absolute;bottom:0;left:0;right:0;height:4px;background:rgba(255,255,255,0.06)}
#progB{height:100%;background:#7c3aed;transition:width 0.8s linear}
#hint{position:absolute;bottom:10px;left:50%;transform:translateX(-50%);font-size:0.72rem;color:rgba(255,255,255,0.18);white-space:nowrap;z-index:10}

#goView{display:none;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:12px}
#goView h2{font-size:2rem;font-weight:700}
#fscore{font-size:4rem;font-weight:900;color:#a78bfa;text-shadow:0 0 30px rgba(124,58,237,0.6)}
#fdet{font-size:0.9rem;color:#6b7280}
.bRow{display:flex;gap:12px;margin-top:6px}

/* Swipe flash overlay */
#flashL,#flashR{position:absolute;inset:0;pointer-events:none;opacity:0;transition:opacity 0.12s;z-index:20}
#flashL{background:linear-gradient(to right,rgba(99,102,241,0.35),transparent)}
#flashR{background:linear-gradient(to left,rgba(234,88,12,0.35),transparent)}
</style>
</head>
<body>
<div id="root">

  <!-- START -->
  <div id="startView">
    <h1>🧮 Math Gesture Game</h1>
    <p class="sub">เลขตกมาสองฝั่ง — โบกมือซ้าย/ขวาผ่านกล้องเพื่อเลือกคำตอบ</p>
    <input class="nameIn" id="nameIn" placeholder="ชื่อผู้เล่น" maxlength="20"/>
    <button class="sBtn sBtnP" id="startCamBtn">📷 เปิดกล้อง + เริ่มเล่น</button>
    <button class="sBtn sBtnS" id="startNoCamBtn">🖱 เล่นแบบคลิก / คีย์บอร์ด</button>
    <p class="camNote">← → Arrow keys หรือคลิกซ้าย/ขวาใช้ได้เสมอ แม้ไม่เปิดกล้อง</p>
  </div>

  <!-- GAME -->
  <div id="gameView">
    <div id="camSide">
      <h3>📷 กล้อง</h3>
      <div id="vWrap">
        <video id="camVid" autoplay muted playsinline></video>
        <canvas id="motionCvs"></canvas>
      </div>
      <div id="camErr" style="display:none">ไม่พบกล้อง — ใช้คีย์บอร์ดแทนได้</div>
      <div id="gStatus">
        <span id="gIcon">👋</span>
        <div id="gLabel">รอการเคลื่อนไหว...</div>
      </div>
      <div class="statB"><div class="statL">⏱ เวลา</div><div class="statV" id="tV">60</div></div>
      <div class="statB"><div class="statL">⭐ คะแนน</div><div class="statV" id="sV">0</div></div>
      <div class="statRow">
        <div class="statB" style="flex:1"><div class="statL">❤️</div><div class="statV" id="lV">3</div></div>
        <div class="statB" style="flex:1"><div class="statL">🔥</div><div class="statV" id="stV">0</div></div>
      </div>
      <button id="pauseB">⏸ หยุด</button>
    </div>

    <div id="mainArea">
      <div id="flashL"></div><div id="flashR"></div>
      <div id="hud">
        <div id="qDisp">–</div>
        <div id="lvlB">Level 1</div>
      </div>
      <canvas id="gCanvas"></canvas>
      <div class="sideL" id="lL">👈<br>ซ้าย</div>
      <div class="sideL" id="rL">👉<br>ขวา</div>
      <div id="hint">← คลิก / กดลูกศร / โบกมือ →</div>
      <div id="progW"><div id="progB" style="width:100%"></div></div>
    </div>
  </div>

  <!-- GAME OVER -->
  <div id="goView">
    <h2 id="goTitle">หมดเวลา! ⏰</h2>
    <div id="fscore">0</div>
    <div id="fdet">–</div>
    <div class="bRow">
      <button class="sBtn sBtnP" id="reBtn">🔄 เล่นอีกรอบ</button>
      <button class="sBtn sBtnS" id="homeBtn">🏠 หน้าหลัก</button>
    </div>
  </div>
</div>

<script>
const GTIME=60,MLIVES=3,SPEEDS=[1.4,2.0,2.6,3.2];
let state='idle',score=0,lives=MLIVES,streak=0,timer=GTIME,level=1,corr=0,wrng=0;
let maxStreak=0,numbers=[],effects=[],question=null,paused=false,tid=null,fid=null;
let useCam=false,camStream=null,gestureInt=null,gCool=0,prevFrame=null,ghist=[];
let playerName='Player';

const canvas=document.getElementById('gCanvas'),ctx=canvas.getContext('2d');
const mcvs=document.getElementById('motionCvs'),mctx=mcvs.getContext('2d');

function resz(){const a=document.getElementById('mainArea');canvas.width=a.clientWidth;canvas.height=a.clientHeight;}
window.addEventListener('resize',resz);

const rand=(a,b)=>Math.floor(Math.random()*(b-a+1))+a;

function genQ(){
  const ops=level<3?['+','-']:level<4?['+','-','×']:['+','-','×','÷'];
  const op=ops[rand(0,ops.length-1)];
  let a,b,ans;
  if(op==='+'){const m=level<2?10:level<3?30:level<4?60:100;a=rand(1,m);b=rand(1,m);ans=a+b;}
  else if(op==='-'){const m=level<2?10:level<3?30:level<4?60:100;b=rand(1,m);a=rand(b,m+b);ans=a-b;}
  else if(op==='×'){const m=level<3?6:12;a=rand(1,m);b=rand(1,m);ans=a*b;}
  else{b=rand(1,12);ans=rand(1,12);a=b*ans;}
  return{a,b,op,ans};
}

function genChoices(ans){
  const s=new Set([ans]);
  while(s.size<6){const d=rand(-Math.max(3,Math.floor(ans*.35)),Math.max(3,Math.floor(ans*.35)));const c=ans+d;if(c!==ans&&c>=0)s.add(c);}
  return[...s].sort(()=>Math.random()-.5);
}

class Num{
  constructor(val,side,ok){
    this.val=val;this.side=side;this.ok=ok;
    const w=canvas.width;
    this.x=side==='left'?rand(10,w/2-90):rand(w/2+10,w-100);
    this.y=-55;this.w=78;this.h=48;
    this.spd=SPEEDS[Math.min(level-1,3)]+Math.random()*.7;
    this.alpha=1;this.shk=0;this.t=0;this.dead=false;
  }
  update(){
    this.y+=this.spd;this.t+=0.1;
    if(this.shk>0)this.shk--;
    if(this.y>canvas.height+70){this.dead=true;if(this.ok)loseLife();}
  }
  draw(){
    const ox=this.x+(this.shk?(Math.random()-.5)*6:0),oy=this.y;
    const g=.5+.5*Math.sin(this.t);
    ctx.save();ctx.globalAlpha=this.alpha;
    ctx.shadowBlur=14+g*7;
    ctx.shadowColor=this.side==='left'?'rgba(99,102,241,0.75)':'rgba(234,88,12,0.75)';
    const gr=ctx.createLinearGradient(ox,oy,ox,oy+this.h);
    if(this.side==='left'){gr.addColorStop(0,'rgba(99,102,241,0.93)');gr.addColorStop(1,'rgba(67,56,202,0.97)');}
    else{gr.addColorStop(0,'rgba(234,88,12,0.93)');gr.addColorStop(1,'rgba(194,65,12,0.97)');}
    ctx.fillStyle=gr;rr(ctx,ox,oy,this.w,this.h,24);ctx.fill();
    ctx.shadowBlur=0;
    ctx.strokeStyle=this.side==='left'?'rgba(165,180,252,0.65)':'rgba(253,186,116,0.65)';
    ctx.lineWidth=1.5;rr(ctx,ox,oy,this.w,this.h,24);ctx.stroke();
    ctx.fillStyle='white';
    ctx.font=`bold ${this.val>99?15:20}px 'Segoe UI',sans-serif`;
    ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText(this.val,ox+this.w/2,oy+this.h/2);
    ctx.restore();
  }
}

class Fx{
  constructor(x,y,txt,col){this.x=x;this.y=y;this.txt=txt;this.col=col;this.vy=-2.8;this.a=1.3;this.sc=1.5;}
  update(){this.y+=this.vy;this.a-=0.032;this.sc=Math.max(1,this.sc-.022);}
  draw(){
    if(this.a<=0)return;
    ctx.save();ctx.globalAlpha=Math.min(1,this.a);ctx.fillStyle=this.col;
    ctx.font=`bold ${Math.round(21*this.sc)}px 'Segoe UI'`;
    ctx.textAlign='center';ctx.shadowBlur=10;ctx.shadowColor=this.col;
    ctx.fillText(this.txt,this.x,this.y);ctx.restore();
  }
  get dead(){return this.a<=0;}
}

function rr(c,x,y,w,h,r){
  c.beginPath();c.moveTo(x+r,y);c.lineTo(x+w-r,y);c.arcTo(x+w,y,x+w,y+h,r);
  c.lineTo(x+w,y+h-r);c.arcTo(x+w,y+h,x,y+h,r);c.lineTo(x+r,y+h);
  c.arcTo(x,y+h,x,y,r);c.lineTo(x,y+r);c.arcTo(x,y,x+w,y,r);c.closePath();
}

let spT=0;
function spawn(){
  if(!question)return;
  const cs=Math.random()<.5?'left':'right',ws=cs==='left'?'right':'left';
  const wrong=genChoices(question.ans).find(c=>c!==question.ans);
  numbers.push(new Num(question.ans,cs,true));
  numbers.push(new Num(wrong??question.ans-1,ws,false));
}

function nextQ(){numbers=[];question=genQ();spT=0;spawn();updateHUD();}

function flash(side){
  const el=document.getElementById(side==='left'?'flashL':'flashR');
  el.style.opacity='1';setTimeout(()=>el.style.opacity='0',180);
}

function choose(side){
  if(state!=='playing'||paused)return;
  flash(side);
  const n=numbers.find(x=>x.side===side&&!x.dead);
  if(!n)return;
  if(n.ok){
    streak++;if(streak>maxStreak)maxStreak=streak;
    const bonus=streak>=3?streak:1;score+=10*bonus;corr++;
    effects.push(new Fx(n.x+n.w/2,n.y,streak>=3?`+${10*bonus} ×${streak}`:`+10 ✓`,'#34d399'));
    n.dead=true;level=Math.min(4,1+Math.floor(corr/8));
    document.getElementById('lvlB').textContent='Level '+level;
    nextQ();
  }else{
    streak=0;wrng++;n.shk=10;
    effects.push(new Fx(n.x+n.w/2,n.y,'✗ ผิด!','#f87171'));
    loseLife();
  }
  updateHUD();
}

function loseLife(){lives--;updateHUD();if(lives<=0)endGame('dead');}

function updateHUD(){
  if(!question)return;
  const om={'+':'+','-':'−','×':'×','÷':'÷'};
  document.getElementById('qDisp').innerHTML=`${question.a} <span class="op">${om[question.op]}</span> ${question.b} = <span class="op">?</span>`;
  document.getElementById('sV').textContent=score;
  document.getElementById('lV').textContent='❤️'.repeat(Math.max(0,lives));
  document.getElementById('stV').textContent=streak;
  document.getElementById('tV').textContent=timer;
  document.getElementById('progB').style.width=(timer/GTIME*100)+'%';
}

function loop(){
  if(state!=='playing')return;
  fid=requestAnimationFrame(loop);
  if(paused)return;
  spT++;
  if(numbers.length===0||(spT>110&&numbers.every(n=>n.dead))){spawn();spT=0;}
  numbers.forEach(n=>n.update());numbers=numbers.filter(n=>!n.dead);
  effects.forEach(e=>e.update());effects=effects.filter(e=>!e.dead);
  ctx.clearRect(0,0,canvas.width,canvas.height);
  ctx.save();ctx.strokeStyle='rgba(255,255,255,0.05)';ctx.lineWidth=1;ctx.setLineDash([5,12]);
  ctx.beginPath();ctx.moveTo(canvas.width/2,55);ctx.lineTo(canvas.width/2,canvas.height-15);ctx.stroke();ctx.restore();
  numbers.forEach(n=>n.draw());effects.forEach(e=>e.draw());
}

function startGame(){
  score=0;lives=MLIVES;streak=0;maxStreak=0;timer=GTIME;level=1;corr=0;wrng=0;paused=false;
  numbers=[];effects=[];state='playing';
  resz();nextQ();
  clearInterval(tid);
  tid=setInterval(()=>{if(paused||state!=='playing')return;timer--;updateHUD();if(timer<=0)endGame('time');},1000);
  cancelAnimationFrame(fid);loop();
  if(useCam)startCam();
}

function endGame(r){
  state='gameover';clearInterval(tid);cancelAnimationFrame(fid);stopCam();
  document.getElementById('goTitle').textContent=r==='time'?'⏰ หมดเวลา!':'💔 ชีวิตหมด!';
  document.getElementById('fscore').textContent=score;
  document.getElementById('fdet').textContent=`ถูก ${corr}  ผิด ${wrng}  Streak สูงสุด ${maxStreak}  Level ${level}`;
  show('goView');
  saveScore();
}

function saveScore(){
  try{
    const key='mathGameScores';
    const arr=JSON.parse(localStorage.getItem(key)||'[]');
    arr.push({name:playerName,score,level,corr,wrng,maxStreak,date:new Date().toLocaleString('th-TH')});
    arr.sort((a,b)=>b.score-a.score);
    localStorage.setItem(key,JSON.stringify(arr.slice(0,20)));
  }catch(e){}
}

// ---- CAMERA ----
async function startCam(){
  try{
    camStream=await navigator.mediaDevices.getUserMedia({video:{width:320,height:240,facingMode:'user'}});
    const v=document.getElementById('camVid');
    v.srcObject=camStream;await v.play();
    document.getElementById('camErr').style.display='none';
    mcvs.width=v.videoWidth||320;mcvs.height=v.videoHeight||240;
    prevFrame=null;ghist=[];
    gestureInt=setInterval(()=>{if(gCool>0){gCool--;return;}processFrame();},55);
  }catch(e){
    document.getElementById('camErr').style.display='block';
    document.getElementById('gIcon').textContent='📵';
    document.getElementById('gLabel').textContent='ไม่พบกล้อง';
  }
}

function processFrame(){
  const v=document.getElementById('camVid');
  if(v.readyState<2||!v.videoWidth)return;
  const w=mcvs.width,h=mcvs.height;
  mctx.drawImage(v,0,0,w,h);
  const curr=mctx.getImageData(0,0,w,h);
  if(!prevFrame){prevFrame=curr;return;}
  let sumX=0,cnt=0;
  const d1=prevFrame.data,d2=curr.data;
  for(let i=0;i<d2.length;i+=12){
    const diff=Math.abs(d2[i]-d1[i])+Math.abs(d2[i+1]-d1[i+1])+Math.abs(d2[i+2]-d1[i+2]);
    if(diff>42){sumX+=((i/4)%w);cnt++;}
  }
  mctx.clearRect(0,0,w,h);
  if(cnt>700){
    const cx=sumX/cnt;
    mctx.beginPath();mctx.arc(cx,h/2,18,0,Math.PI*2);
    mctx.fillStyle='rgba(167,139,250,0.55)';mctx.fill();
    mctx.beginPath();mctx.arc(cx,h/2,24,0,Math.PI*2);
    mctx.strokeStyle='rgba(167,139,250,0.3)';mctx.lineWidth=2;mctx.stroke();
    ghist.push(cx);
    if(ghist.length>7)ghist.shift();
    if(ghist.length>=7){
      const delta=ghist[ghist.length-1]-ghist[0];
      if(Math.abs(delta)>w*.21){
        const dir=delta<0?'right':'left';
        document.getElementById('gIcon').textContent=dir==='left'?'👈':'👉';
        document.getElementById('gLabel').textContent=dir==='left'?'โบกซ้าย!':'โบกขวา!';
        choose(dir);gCool=22;ghist=[];
        setTimeout(()=>{document.getElementById('gIcon').textContent='👋';document.getElementById('gLabel').textContent='รอการเคลื่อนไหว...';},550);
      }
    }
  }else{ghist=[];}
  prevFrame=curr;
}

function stopCam(){
  clearInterval(gestureInt);gestureInt=null;prevFrame=null;ghist=[];
  if(camStream){camStream.getTracks().forEach(t=>t.stop());camStream=null;}
}

function show(id){
  document.getElementById('startView').style.display='none';
  document.getElementById('gameView').style.display='none';
  document.getElementById('goView').style.display='none';
  const el=document.getElementById(id);
  el.style.display='flex';
  if(id==='gameView')resz();
}

// ---- EVENTS ----
document.getElementById('startCamBtn').onclick=()=>{
  playerName=document.getElementById('nameIn').value.trim()||'Player';
  useCam=true;show('gameView');startGame();
};
document.getElementById('startNoCamBtn').onclick=()=>{
  playerName=document.getElementById('nameIn').value.trim()||'Player';
  useCam=false;show('gameView');startGame();
  document.getElementById('vWrap').style.display='none';
  document.getElementById('gLabel').textContent='ใช้คลิก/คีย์บอร์ด';
};
document.getElementById('pauseB').onclick=()=>{
  paused=!paused;document.getElementById('pauseB').textContent=paused?'▶ ต่อ':'⏸ หยุด';
};
document.getElementById('reBtn').onclick=()=>{show('gameView');startGame();};
document.getElementById('homeBtn').onclick=()=>{stopCam();state='idle';clearInterval(tid);cancelAnimationFrame(fid);show('startView');};

document.getElementById('mainArea').addEventListener('click',e=>{
  if(state!=='playing')return;
  choose(e.offsetX<e.currentTarget.clientWidth/2?'left':'right');
});
window.addEventListener('keydown',e=>{
  if(e.key==='ArrowLeft'){e.preventDefault();choose('left');}
  if(e.key==='ArrowRight'){e.preventDefault();choose('right');}
  if(e.key===' '){e.preventDefault();if(state==='playing'){paused=!paused;document.getElementById('pauseB').textContent=paused?'▶ ต่อ':'⏸ หยุด';}}
});
</script>
</body>
</html>
