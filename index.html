<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Math Gesture Game</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#000;font-family:'Segoe UI',sans-serif}

/* ===== CAMERA BACKGROUND ===== */
#camBg{position:fixed;inset:0;width:100%;height:100%;object-fit:cover;transform:scaleX(-1);z-index:0}
#overlay{position:fixed;inset:0;background:rgba(0,0,0,0.45);z-index:1;pointer-events:none}

/* ===== MOTION CANVAS (hand dot) ===== */
#motionCvs{position:fixed;inset:0;width:100%;height:100%;transform:scaleX(-1);z-index:2;pointer-events:none}

/* ===== GAME CANVAS ===== */
#gCanvas{position:fixed;inset:0;width:100%;height:100%;z-index:3;pointer-events:none}

/* ===== UI LAYERS ===== */
#ui{position:fixed;inset:0;z-index:4;pointer-events:none}

/* HUD top bar */
#hud{
  position:absolute;top:0;left:0;right:0;
  display:flex;justify-content:space-between;align-items:center;
  padding:14px 24px;
  background:linear-gradient(to bottom,rgba(0,0,0,0.75),transparent);
  pointer-events:none;
}
#qDisp{
  font-size:clamp(1.6rem,3.5vw,2.4rem);font-weight:900;
  color:#fff;letter-spacing:3px;
  text-shadow:0 2px 18px rgba(0,0,0,0.9);
}
#qDisp .op{color:#c4b5fd}
.hudRight{display:flex;gap:10px;align-items:center}
.pill{
  background:rgba(0,0,0,0.55);border:1px solid rgba(255,255,255,0.18);
  border-radius:20px;padding:5px 14px;font-size:0.8rem;color:#e5e7eb;
  backdrop-filter:blur(6px);
}
#lvlPill{color:#c4b5fd;border-color:rgba(167,139,250,0.45)}
#streakPill{color:#fbbf24;border-color:rgba(251,191,36,0.4)}

/* Bottom stats */
#stats{
  position:absolute;bottom:0;left:0;right:0;
  display:flex;justify-content:space-between;align-items:flex-end;
  padding:0 24px 16px;
  background:linear-gradient(to top,rgba(0,0,0,0.75),transparent);
  pointer-events:none;
}
.statG{display:flex;gap:6px;align-items:flex-end}
.stCard{
  background:rgba(0,0,0,0.55);border:1px solid rgba(255,255,255,0.15);
  border-radius:12px;padding:7px 14px;text-align:center;backdrop-filter:blur(6px);
}
.stL{font-size:0.6rem;color:#9ca3af;text-transform:uppercase;letter-spacing:1px}
.stV{font-size:1.3rem;font-weight:800;line-height:1.1}
#tV{color:#f87171}#sV{color:#34d399}#lV{color:#f9a8d4}

/* Timer bar */
#progW{position:absolute;bottom:0;left:0;right:0;height:3px;background:rgba(255,255,255,0.08)}
#progB{height:100%;background:rgba(167,139,250,0.8);transition:width 0.8s linear}

/* Side labels */
.sideHint{
  position:absolute;top:50%;transform:translateY(-50%);
  font-size:0.85rem;color:rgba(255,255,255,0.35);
  writing-mode:vertical-rl;letter-spacing:4px;text-transform:uppercase;
  pointer-events:none;
}
#lHint{left:10px;transform:translateY(-50%) rotate(180deg)}
#rHint{right:10px}

/* Pause button */
#pauseB{
  position:absolute;top:14px;left:50%;transform:translateX(-50%);
  pointer-events:all;cursor:pointer;
  background:rgba(0,0,0,0.5);border:1px solid rgba(255,255,255,0.2);
  border-radius:20px;padding:5px 18px;color:#d1d5db;font-size:0.8rem;
  backdrop-filter:blur(6px);
}
#pauseB:hover{background:rgba(255,255,255,0.12)}

/* Cam error */
#camErr{
  position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  background:rgba(239,68,68,0.15);border:1px solid rgba(239,68,68,0.35);
  border-radius:12px;padding:14px 22px;text-align:center;color:#fca5a5;font-size:0.9rem;
  display:none;backdrop-filter:blur(8px);
}

/* Hand cursor dot */
#handDot{
  position:fixed;width:32px;height:32px;border-radius:50%;
  border:2.5px solid rgba(167,139,250,0.9);
  background:rgba(167,139,250,0.25);
  transform:translate(-50%,-50%);
  pointer-events:none;z-index:5;
  transition:left 0.05s,top 0.05s;
  display:none;
}
#handDot.active{display:block}

/* ===== VIEWS ===== */
#startView,#goView{
  position:fixed;inset:0;z-index:10;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:14px;
  background:rgba(0,0,0,0.72);backdrop-filter:blur(12px);
}
#startView h1{font-size:2.6rem;font-weight:900;color:#a78bfa;letter-spacing:-1px}
.sub{font-size:0.9rem;color:#9ca3af;max-width:380px;text-align:center;line-height:1.7}
.nameIn{
  padding:12px 20px;border-radius:14px;
  border:1.5px solid rgba(167,139,250,0.45);
  background:rgba(255,255,255,0.07);color:white;
  font-size:1rem;width:280px;text-align:center;outline:none;
  backdrop-filter:blur(6px);
}
.nameIn::placeholder{color:#4b5563}
.nameIn:focus{border-color:rgba(167,139,250,0.8)}
.sBtn{
  padding:12px 34px;border-radius:14px;border:none;
  font-size:1rem;font-weight:700;cursor:pointer;
  transition:all 0.15s;
}
.sBtnP{background:#7c3aed;color:white}
.sBtnP:hover{background:#6d28d9;transform:translateY(-2px);box-shadow:0 10px 25px rgba(124,58,237,0.45)}
.sBtnS{background:rgba(255,255,255,0.09);color:#d1d5db;border:1px solid rgba(255,255,255,0.18)}
.sBtnS:hover{background:rgba(255,255,255,0.15)}
.note{font-size:0.75rem;color:#4b5563;max-width:300px;text-align:center;line-height:1.5}

#goView{display:none}
#goView h2{font-size:2rem;font-weight:700;color:white}
#fscore{font-size:4.5rem;font-weight:900;color:#a78bfa;text-shadow:0 0 30px rgba(124,58,237,0.5)}
#fdet{font-size:0.9rem;color:#6b7280}
.bRow{display:flex;gap:12px;margin-top:8px}
</style>
</head>
<body>

<!-- Camera as full-screen background -->
<video id="camBg" autoplay muted playsinline></video>
<div id="overlay"></div>
<canvas id="motionCvs"></canvas>
<canvas id="gCanvas"></canvas>
<div id="handDot"></div>

<!-- Game UI -->
<div id="ui">
  <div id="hud" style="display:none">
    <div id="qDisp">–</div>
    <div class="hudRight">
      <div class="pill" id="streakPill">🔥 0</div>
      <div class="pill" id="lvlPill">Lv 1</div>
    </div>
  </div>
  <div class="sideHint" id="lHint">ซ้าย</div>
  <div class="sideHint" id="rHint">ขวา</div>
  <div id="stats" style="display:none">
    <div class="statG">
      <div class="stCard"><div class="stL">⏱ เวลา</div><div class="stV" id="tV">60</div></div>
      <div class="stCard"><div class="stL">⭐ คะแนน</div><div class="stV" id="sV">0</div></div>
    </div>
    <div class="stCard"><div class="stL">❤️ ชีวิต</div><div class="stV" id="lV">❤️❤️❤️</div></div>
    <button id="pauseB" style="position:relative;top:auto;left:auto;transform:none;pointer-events:all">⏸ หยุด</button>
  </div>
  <div id="progW" style="display:none"><div id="progB" style="width:100%"></div></div>
  <div id="camErr">📵 ไม่พบกล้อง — กด ← → แทนได้</div>
</div>

<!-- Start Screen -->
<div id="startView">
  <h1>🧮 Math Gesture</h1>
  <p class="sub">เลขตกลงมาบนภาพกล้อง — เอามือแตะเลขที่ถูกต้องเลย!</p>
  <input class="nameIn" id="nameIn" placeholder="ชื่อผู้เล่น" maxlength="20"/>
  <button class="sBtn sBtnP" id="startCamBtn">📷 เปิดกล้อง + เริ่มเล่น</button>
  <button class="sBtn sBtnS" id="startNoCamBtn">🖱 คลิก / คีย์บอร์ด</button>
  <p class="note">← → Arrow keys หรือคลิกซ้าย/ขวาก็ใช้ได้</p>
</div>

<!-- Game Over -->
<div id="goView">
  <h2 id="goTitle">หมดเวลา! ⏰</h2>
  <div id="fscore">0</div>
  <div id="fdet">–</div>
  <div class="bRow">
    <button class="sBtn sBtnP" id="reBtn">🔄 เล่นอีกรอบ</button>
    <button class="sBtn sBtnS" id="homeBtn">🏠 หน้าหลัก</button>
  </div>
</div>

<script>
// ============================================================
// CONFIG
// ============================================================
const GTIME=60, MLIVES=3, SPEEDS=[1.4,2.0,2.6,3.2];

// ============================================================
// STATE
// ============================================================
let state='idle', score=0, lives=MLIVES, streak=0, timer=GTIME;
let level=1, corr=0, wrng=0, maxStreak=0;
let numbers=[], effects=[], question=null, paused=false;
let tid=null, fid=null;
let useCam=false, camStream=null, gestureInt=null;
let gCool=0, prevFrame=null, ghist=[];
let playerName='Player';
// Hand position (in screen coords, mirrored)
let handX=-1, handY=-1, handVisible=false;

// ============================================================
// CANVAS SETUP
// ============================================================
const canvas=document.getElementById('gCanvas');
const ctx=canvas.getContext('2d');
const mcvs=document.getElementById('motionCvs');
const mctx=mcvs.getContext('2d');

function resz(){
  canvas.width=window.innerWidth;
  canvas.height=window.innerHeight;
  mcvs.width=window.innerWidth;
  mcvs.height=window.innerHeight;
}
window.addEventListener('resize',resz);
resz();

// ============================================================
// MATH
// ============================================================
const rand=(a,b)=>Math.floor(Math.random()*(b-a+1))+a;

function genQ(){
  const ops=level<3?['+','-']:level<4?['+','-','×']:['+','-','×','÷'];
  const op=ops[rand(0,ops.length-1)];
  let a,b,ans;
  if(op==='+'){const m=level<2?10:level<3?30:level<4?60:100;a=rand(1,m);b=rand(1,m);ans=a+b;}
  else if(op==='-'){const m=level<2?10:level<3?30:level<4?60:100;b=rand(1,m);a=rand(b,m+b);ans=a-b;}
  else if(op==='×'){const m=level<3?6:12;a=rand(1,m);b=rand(1,m);ans=a*b;}
  else{b=rand(1,12);ans=rand(1,12);a=b*ans;}
  return{a,b,op,ans};
}

function genWrong(ans){
  const s=new Set([ans]);
  while(s.size<8){
    const d=rand(-Math.max(4,Math.floor(ans*.4)),Math.max(4,Math.floor(ans*.4)));
    const c=ans+d;if(c!==ans&&c>=0)s.add(c);
  }
  return[...s].filter(x=>x!==ans)[rand(0,6)];
}

// ============================================================
// NUMBER BLOCKS
// ============================================================
class Num{
  constructor(val,side,ok){
    this.val=val; this.side=side; this.ok=ok;
    const W=canvas.width, H=canvas.height;
    this.w=84; this.h=52;
    // Spread across left or right half, avoid edges
    if(side==='left'){
      this.x=rand(30,W/2-this.w-20);
    }else{
      this.x=rand(W/2+20,W-this.w-30);
    }
    this.y=-this.h-10;
    this.spd=SPEEDS[Math.min(level-1,3)]+Math.random()*0.8;
    this.alpha=1; this.shk=0; this.t=0; this.dead=false;
    this.hitAnim=0;
  }
  get cx(){return this.x+this.w/2;}
  get cy(){return this.y+this.h/2;}
  // Check if hand is touching this block
  isTouched(){
    if(!handVisible||handX<0)return false;
    const pad=18;
    return handX>this.x-pad && handX<this.x+this.w+pad &&
           handY>this.y-pad && handY<this.y+this.h+pad;
  }
  update(){
    this.y+=this.spd; this.t+=0.08;
    if(this.shk>0)this.shk--;
    if(this.hitAnim>0)this.hitAnim--;
    if(this.y>canvas.height+80){this.dead=true;if(this.ok)loseLife();}
  }
  draw(){
    const ox=this.x+(this.shk?(Math.random()-.5)*6:0), oy=this.y;
    const pulse=0.5+0.5*Math.sin(this.t);
    const touched=this.isTouched();

    ctx.save();
    ctx.globalAlpha=this.alpha;

    // Glow when hand is near
    if(touched){
      ctx.shadowBlur=28;
      ctx.shadowColor=this.ok?'rgba(52,211,153,0.9)':'rgba(248,113,113,0.9)';
    }else{
      ctx.shadowBlur=12+pulse*6;
      ctx.shadowColor=this.side==='left'?'rgba(99,102,241,0.6)':'rgba(234,88,12,0.6)';
    }

    // Background
    const gr=ctx.createLinearGradient(ox,oy,ox,oy+this.h);
    if(touched){
      if(this.ok){gr.addColorStop(0,'rgba(52,211,153,0.9)');gr.addColorStop(1,'rgba(16,185,129,0.95)');}
      else{gr.addColorStop(0,'rgba(248,113,113,0.9)');gr.addColorStop(1,'rgba(220,38,38,0.95)');}
    }else if(this.side==='left'){
      gr.addColorStop(0,'rgba(99,102,241,0.88)');gr.addColorStop(1,'rgba(67,56,202,0.93)');
    }else{
      gr.addColorStop(0,'rgba(234,88,12,0.88)');gr.addColorStop(1,'rgba(194,65,12,0.93)');
    }
    ctx.fillStyle=gr;
    rr(ctx,ox,oy,this.w,this.h,26);ctx.fill();

    // Border
    ctx.shadowBlur=0;
    ctx.strokeStyle=touched?'rgba(255,255,255,0.9)':
      (this.side==='left'?'rgba(165,180,252,0.5)':'rgba(253,186,116,0.5)');
    ctx.lineWidth=touched?2:1.5;
    rr(ctx,ox,oy,this.w,this.h,26);ctx.stroke();

    // Number text
    ctx.fillStyle='white';
    ctx.font=`bold ${this.val>99?16:20}px 'Segoe UI',sans-serif`;
    ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.shadowBlur=0;
    ctx.fillText(this.val,ox+this.w/2,oy+this.h/2);
    ctx.restore();
  }
}

// ============================================================
// FX PARTICLES
// ============================================================
class Fx{
  constructor(x,y,txt,col){
    this.x=x;this.y=y;this.txt=txt;this.col=col;
    this.vy=-3.2;this.a=1.4;this.sc=1.8;
  }
  update(){this.y+=this.vy;this.a-=0.028;this.sc=Math.max(1,this.sc-0.02);}
  draw(){
    if(this.a<=0)return;
    ctx.save();
    ctx.globalAlpha=Math.min(1,this.a);
    ctx.fillStyle=this.col;
    ctx.font=`bold ${Math.round(22*this.sc)}px 'Segoe UI'`;
    ctx.textAlign='center';
    ctx.shadowBlur=12;ctx.shadowColor=this.col;
    ctx.fillText(this.txt,this.x,this.y);
    ctx.restore();
  }
  get dead(){return this.a<=0;}
}

function rr(c,x,y,w,h,r){
  c.beginPath();
  c.moveTo(x+r,y);c.lineTo(x+w-r,y);c.arcTo(x+w,y,x+w,y+h,r);
  c.lineTo(x+w,y+h-r);c.arcTo(x+w,y+h,x,y+h,r);
  c.lineTo(x+r,y+h);c.arcTo(x,y+h,x,y,r);
  c.lineTo(x,y+r);c.arcTo(x,y,x+w,y,r);
  c.closePath();
}

// ============================================================
// GAME LOGIC
// ============================================================
let spawnCd=0;

function spawn(){
  if(!question)return;
  const cs=Math.random()<.5?'left':'right';
  const ws=cs==='left'?'right':'left';
  const wrong=genWrong(question.ans);
  numbers.push(new Num(question.ans,cs,true));
  numbers.push(new Num(wrong,ws,false));
}

function nextQ(){
  numbers=[];question=genQ();spawnCd=0;spawn();updateHUD();
}

function choose(side){
  if(state!=='playing'||paused)return;
  const n=numbers.find(x=>x.side===side&&!x.dead);
  if(!n)return;
  if(n.ok){
    streak++;if(streak>maxStreak)maxStreak=streak;
    const bonus=streak>=3?streak:1;
    score+=10*bonus;corr++;
    effects.push(new Fx(n.cx,n.cy,streak>=3?`+${10*bonus} ×${streak}!`:`+10 ✓`,'#34d399'));
    n.dead=true;
    level=Math.min(4,1+Math.floor(corr/8));
    nextQ();
  }else{
    streak=0;wrng++;n.shk=10;
    effects.push(new Fx(n.cx,n.cy,'✗ ผิด!','#f87171'));
    loseLife();
  }
  updateHUD();
}

// Hand-touch checking (called every frame)
function checkHandTouch(){
  if(!handVisible||gCool>0)return;
  for(const n of numbers){
    if(n.dead)continue;
    if(n.isTouched()){
      choose(n.side);
      gCool=25;
      return;
    }
  }
}

function loseLife(){
  lives--;updateHUD();
  if(lives<=0)endGame('dead');
}

function updateHUD(){
  if(!question)return;
  const om={'+':'+','-':'−','×':'×','÷':'÷'};
  document.getElementById('qDisp').innerHTML=
    `${question.a} <span class="op">${om[question.op]}</span> ${question.b} = <span class="op">?</span>`;
  document.getElementById('sV').textContent=score;
  document.getElementById('lV').textContent='❤️'.repeat(Math.max(0,lives));
  document.getElementById('tV').textContent=timer;
  document.getElementById('streakPill').textContent=`🔥 ${streak}`;
  document.getElementById('lvlPill').textContent=`Lv ${level}`;
  document.getElementById('progB').style.width=(timer/GTIME*100)+'%';
}

// ============================================================
// GAME LOOP
// ============================================================
function loop(){
  if(state!=='playing')return;
  fid=requestAnimationFrame(loop);
  if(paused)return;

  if(gCool>0)gCool--;
  spawnCd++;
  if(numbers.length===0||(spawnCd>120&&numbers.every(n=>n.dead))){
    spawn();spawnCd=0;
  }

  numbers.forEach(n=>n.update());
  numbers=numbers.filter(n=>!n.dead);
  effects.forEach(e=>e.update());
  effects=effects.filter(e=>!e.dead);

  // Check hand touch
  if(useCam)checkHandTouch();

  ctx.clearRect(0,0,canvas.width,canvas.height);

  // Divider line
  ctx.save();
  ctx.strokeStyle='rgba(255,255,255,0.12)';
  ctx.lineWidth=1;
  ctx.setLineDash([6,14]);
  ctx.beginPath();
  ctx.moveTo(canvas.width/2,60);
  ctx.lineTo(canvas.width/2,canvas.height-50);
  ctx.stroke();
  ctx.restore();

  numbers.forEach(n=>n.draw());
  effects.forEach(e=>e.draw());
}

// ============================================================
// CAMERA & MOTION DETECTION
// ============================================================
async function startCam(){
  try{
    camStream=await navigator.mediaDevices.getUserMedia({
      video:{width:{ideal:1280},height:{ideal:720},facingMode:'user'}
    });
    const v=document.getElementById('camBg');
    v.srcObject=camStream;
    await v.play();
    document.getElementById('camErr').style.display='none';
    prevFrame=null;ghist=[];
    gestureInt=setInterval(processFrame,45);
  }catch(e){
    document.getElementById('camErr').style.display='block';
    useCam=false;
  }
}

function processFrame(){
  const v=document.getElementById('camBg');
  if(v.readyState<2||!v.videoWidth)return;

  const W=canvas.width, H=canvas.height;
  const vW=v.videoWidth, vH=v.videoHeight;

  // Draw video frame to motion canvas (same size as screen)
  mctx.drawImage(v,0,0,W,H);
  const curr=mctx.getImageData(0,0,W,H);
  mctx.clearRect(0,0,W,H);

  if(!prevFrame){prevFrame=curr;return;}

  const d1=prevFrame.data, d2=curr.data;
  let sumX=0, sumY=0, cnt=0;

  // Sample every 3rd pixel for performance
  for(let py=0;py<H;py+=3){
    for(let px=0;px<W;px+=3){
      const i=(py*W+px)*4;
      const diff=Math.abs(d2[i]-d1[i])+Math.abs(d2[i+1]-d1[i+1])+Math.abs(d2[i+2]-d1[i+2]);
      if(diff>40){sumX+=px;sumY+=py;cnt++;}
    }
  }

  if(cnt>300){
    // Raw centroid of motion (in canvas coords, video is mirrored so x is already correct)
    let cx=sumX/cnt;
    let cy=sumY/cnt;

    // Mirror x to match mirrored video
    cx=W-cx;

    // Update hand position
    handX=cx; handY=cy; handVisible=true;

    // Move hand dot UI element
    const dot=document.getElementById('handDot');
    dot.classList.add('active');
    dot.style.left=cx+'px';
    dot.style.top=cy+'px';

    // Draw motion circle on canvas layer (will be covered by game canvas)
    // We just use the handDot div instead

    ghist.push({x:cx,y:cy});
    if(ghist.length>6)ghist.shift();

  }else{
    handVisible=false;
    ghist=[];
    document.getElementById('handDot').classList.remove('active');
    // Fade out
    handX=-1;handY=-1;
  }

  prevFrame=curr;
}

function stopCam(){
  clearInterval(gestureInt);gestureInt=null;
  prevFrame=null;ghist=[];
  handVisible=false;handX=-1;handY=-1;
  document.getElementById('handDot').classList.remove('active');
  if(camStream){camStream.getTracks().forEach(t=>t.stop());camStream=null;}
}

// ============================================================
// START / END
// ============================================================
function startGame(){
  score=0;lives=MLIVES;streak=0;maxStreak=0;
  timer=GTIME;level=1;corr=0;wrng=0;paused=false;
  numbers=[];effects=[];state='playing';spawnCd=0;gCool=0;
  resz();nextQ();

  document.getElementById('hud').style.display='flex';
  document.getElementById('stats').style.display='flex';
  document.getElementById('progW').style.display='block';

  clearInterval(tid);
  tid=setInterval(()=>{
    if(paused||state!=='playing')return;
    timer--;updateHUD();
    if(timer<=0)endGame('time');
  },1000);

  cancelAnimationFrame(fid);loop();

  if(useCam)startCam();
}

function endGame(r){
  state='gameover';clearInterval(tid);cancelAnimationFrame(fid);stopCam();
  document.getElementById('goTitle').textContent=r==='time'?'⏰ หมดเวลา!':'💔 ชีวิตหมด!';
  document.getElementById('fscore').textContent=score;
  document.getElementById('fdet').textContent=`ถูก ${corr}  ผิด ${wrng}  Streak สูงสุด ${maxStreak}  Level ${level}`;
  document.getElementById('goView').style.display='flex';
  document.getElementById('hud').style.display='none';
  document.getElementById('stats').style.display='none';
  document.getElementById('progW').style.display='none';
  saveScore();
}

function saveScore(){
  try{
    const key='mathGameScores';
    const arr=JSON.parse(localStorage.getItem(key)||'[]');
    arr.push({name:playerName,score,level,corr,wrng,maxStreak,date:new Date().toLocaleString('th-TH')});
    arr.sort((a,b)=>b.score-a.score);
    localStorage.setItem(key,JSON.stringify(arr.slice(0,20)));
  }catch(e){}
}

// ============================================================
// CLICK CONTROL (click left/right half of screen)
// ============================================================
document.addEventListener('click',e=>{
  // Ignore clicks on UI buttons
  if(e.target.closest('#ui button, #startView, #goView'))return;
  if(state!=='playing')return;
  choose(e.clientX<window.innerWidth/2?'left':'right');
});

// ============================================================
// KEYBOARD
// ============================================================
window.addEventListener('keydown',e=>{
  if(e.key==='ArrowLeft'){e.preventDefault();choose('left');}
  if(e.key==='ArrowRight'){e.preventDefault();choose('right');}
  if(e.key===' '){
    e.preventDefault();
    if(state==='playing'){
      paused=!paused;
      document.getElementById('pauseB').textContent=paused?'▶ ต่อ':'⏸ หยุด';
    }
  }
});

// ============================================================
// BUTTON EVENTS
// ============================================================
document.getElementById('startCamBtn').onclick=()=>{
  playerName=document.getElementById('nameIn').value.trim()||'Player';
  useCam=true;
  document.getElementById('startView').style.display='none';
  startGame();
};
document.getElementById('startNoCamBtn').onclick=()=>{
  playerName=document.getElementById('nameIn').value.trim()||'Player';
  useCam=false;
  document.getElementById('startView').style.display='none';
  startGame();
};
document.getElementById('pauseB').onclick=()=>{
  paused=!paused;
  document.getElementById('pauseB').textContent=paused?'▶ ต่อ':'⏸ หยุด';
};
document.getElementById('reBtn').onclick=()=>{
  document.getElementById('goView').style.display='none';
  startGame();
};
document.getElementById('homeBtn').onclick=()=>{
  stopCam();state='idle';clearInterval(tid);cancelAnimationFrame(fid);
  document.getElementById('goView').style.display='none';
  document.getElementById('hud').style.display='none';
  document.getElementById('stats').style.display='none';
  document.getElementById('progW').style.display='none';
  document.getElementById('startView').style.display='flex';
  ctx.clearRect(0,0,canvas.width,canvas.height);
};
</script>
</body>
</html>
